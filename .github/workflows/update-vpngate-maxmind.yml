name: Update VPNGate MaxMind Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download MaxMind databases
        run: |
          mkdir -p maxmind
          curl -fsSL "https://6kmfi6hp.github.io/maxmind/GeoLite2-Country.mmdb" -o maxmind/GeoLite2-Country.mmdb
          curl -fsSL "https://6kmfi6hp.github.io/maxmind/GeoLite2-City.mmdb" -o maxmind/GeoLite2-City.mmdb
          curl -fsSL "https://6kmfi6hp.github.io/maxmind/GeoLite2-ASN.mmdb" -o maxmind/GeoLite2-ASN.mmdb
          sha256sum --check <<'EOF'
          6ed0f194250158fe8caad1fc0f7cb92e4a4db9a7e540217ebda2251102631879  maxmind/GeoLite2-Country.mmdb
          756a01c47860acee7b0c6ceed4516b4b920a4813117140879555c1300702f4c2  maxmind/GeoLite2-City.mmdb
          5c0a968504f450ae11ce1a515e10e79ec2656651a30769f4c18ff3f8aebbf884  maxmind/GeoLite2-ASN.mmdb
          EOF

      - name: Run tests
        run: python -m pytest -q

      - name: Update VPNGate data
        run: python check_vpn_risk.py

      - name: Upload generated data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vpngate-with-risk
          path: vpngate_with_risk.json
          if-no-files-found: error

  commit:
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download generated data
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: vpngate-with-risk
          path: .

      - name: Commit updated data
        run: |
          if git diff --quiet -- vpngate_with_risk.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vpngate_with_risk.json
          git commit -m "Auto update VPNGate MaxMind data"
          git push

name: Update VPNGate MaxMind Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download MaxMind databases
        run: |
          set -euo pipefail
          maxmind_ref="$(git ls-remote https://github.com/6Kmfi6HP/maxmind.git refs/heads/main | awk '{print $1}')"
          if ! printf '%s' "$maxmind_ref" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Unable to resolve 6Kmfi6HP/maxmind main commit" >&2
            exit 1
          fi
          base_url="https://raw.githubusercontent.com/6Kmfi6HP/maxmind/$maxmind_ref"
          mkdir -p maxmind

          download_database() {
            edition="$1"
            curl -fsSL "$base_url/$edition.tar.gz.sha256" -o "maxmind/$edition.tar.gz.sha256"
            expected_hash="$(awk '{print $1}' "maxmind/$edition.tar.gz.sha256")"
            expected_archive="$(awk '{print $2}' "maxmind/$edition.tar.gz.sha256")"
            if ! printf '%s' "$expected_hash" | grep -Eq '^[0-9a-f]{64}$'; then
              echo "Invalid SHA256 metadata for $edition" >&2
              exit 1
            fi
            if [ -z "$expected_archive" ]; then
              echo "Missing archive filename metadata for $edition" >&2
              exit 1
            fi
            echo "$edition upstream archive: $expected_archive ($expected_hash)"
            curl -fsSL "$base_url/$edition.mmdb" -o "maxmind/$edition.mmdb"
            test -s "maxmind/$edition.mmdb"
          }

          download_database GeoLite2-Country
          download_database GeoLite2-City
          download_database GeoLite2-ASN

      - name: Run tests
        run: python -m pytest -q

      - name: Update VPNGate data
        run: python check_vpn_risk.py

      - name: Upload generated data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vpngate-with-risk
          path: |
            vpngate_with_risk.json
            mihomo_openvpn.yaml
          if-no-files-found: error

  commit:
    runs-on: ubuntu-latest
    needs: generate
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download generated data
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: vpngate-with-risk
          path: .

      - name: Commit updated data
        run: |
          if git diff --quiet -- vpngate_with_risk.json mihomo_openvpn.yaml; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vpngate_with_risk.json mihomo_openvpn.yaml
          git commit -m "Auto update VPNGate MaxMind data"
          git push
